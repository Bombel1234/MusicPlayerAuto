<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>MP3 Плеер с SVG-иконками</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

    <h2>MP3 Плеер</h2>

    <audio id="player"></audio>

    <div id="controls">
        <button id="prev" title="Предыдущий">
            <i class="fa-solid fa-backward fa-2x"></i>
        </button>
        <button id="startPause" title="Старт / Пауза">
            <i class="fa-solid fa-play fa-2x" id="playIcon" aria-hidden="true"></i>
            <i class="fa-solid fa-pause fa-2x" id="pauseIcon" aria-hidden="true"></i>
        </button>
        <button id="next" title="Следующий">
             <i class="fa-solid fa-forward fa-2x"></i>
        </button>
    </div>

    <div id="current">Текущий трек: -</div>

    <div id="progress-container">
        <div id="progress"></div>
    </div>
    <div id="time">00:00 / 00:00</div>

    <ul id="playlist"></ul>

    <script src="js/main.js"></script>

</body>

</html>
